version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: hrms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hrmss_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./hrms
    container_name: hrms-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - fastapi
    ports:
      - "8080:8080"

    env_file:
       - ./hrms/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hrmss_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      PYTHON_FACE_API_URL: http://fastapi:8000
    

    volumes:
      - ./hrms/uploads:/app/uploads

  fastapi:
    build:
      context: ./fastapi-service
    container_name: hrms-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi-service/face_data:/app/face_data
      - ./hrms/uploads:/app/uploads

volumes:
  mysql_data:

