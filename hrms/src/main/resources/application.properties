#   2. Go to Google Account → Security → App Passwords.
#   3. Generate a password for "Mail" + "Windows Computer" (or any device).
#   4. Paste the 16-character app password below (no spaces).
#
# For other providers change the host/port and auth settings accordingly.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
